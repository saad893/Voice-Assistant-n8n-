<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Assistant</title>
  <meta name="author" content="Syed Muhammad Saad Hasham" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Background noise texture overlay -->
  <div class="noise-overlay"></div>

  <!-- Ambient grid -->
  <div class="grid-bg"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">VOXA</span>
    </div>
    <div class="status-badge" id="statusBadge">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusLabel">READY</span>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <!-- Orb section -->
    <section class="orb-section">
      <div class="orb-outer-ring" id="outerRing"></div>
      <div class="orb-mid-ring" id="midRing"></div>
      <button class="orb" id="orb" aria-label="Click to speak" title="Click to speak">
        <div class="orb-inner-glow"></div>
        <div class="orb-icon" id="orbIcon">
          <!-- Mic SVG -->
          <svg id="iconMic" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor"/>
            <path d="M5 10C5 14.418 8.134 18 12 18C15.866 18 19 14.418 19 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="9" y1="22" x2="15" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <!-- Waveform SVG (shown while listening) -->
          <svg id="iconWave" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
            <line x1="2" y1="12" x2="2" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="wave-bar w1"/>
            <line x1="6" y1="8" x2="6" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="wave-bar w2"/>
            <line x1="10" y1="5" x2="10" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="wave-bar w3"/>
            <line x1="14" y1="8" x2="14" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="wave-bar w4"/>
            <line x1="18" y1="10" x2="18" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="wave-bar w5"/>
            <line x1="22" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="wave-bar w1"/>
          </svg>
          <!-- Speaker SVG (shown while playing) -->
          <svg id="iconSpeaker" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
            <path d="M11 5L6 9H2V15H6L11 19V5Z" fill="currentColor"/>
            <path d="M15.54 8.46C16.48 9.4 17 10.67 17 12C17 13.33 16.48 14.6 15.54 15.54" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M19.07 4.93C20.95 6.81 22 9.35 22 12C22 14.65 20.95 17.19 19.07 19.07" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
      </button>
    </section>

    <!-- Transcript display -->
    <section class="transcript-section">
      <div class="transcript-card" id="transcriptCard">
        <div class="transcript-label">YOU SAID</div>
        <p class="transcript-text" id="transcriptText">—</p>
      </div>
      <div class="transcript-card response-card" id="responseCard" style="display:none;">
        <div class="transcript-label">AI RESPONDED</div>
        <p class="transcript-text" id="responseText">—</p>
      </div>
    </section>

    <!-- Hint text -->
    <p class="hint-text" id="hintText">Click the orb to start speaking</p>

  </main>

  <!-- Config modal -->
  <div class="modal-overlay" id="configModal" style="display:none;">
    <div class="modal">
      <h2 class="modal-title">⚙ Configure Webhook</h2>
      <p class="modal-desc">Enter your n8n <code>process-audio</code> webhook URL below.</p>
      <input
        type="url"
        id="webhookInput"
        class="modal-input"
        placeholder="https://your-n8n.com/webhook/process-audio"
      />
      <div class="modal-actions">
        <button class="btn-secondary" id="cancelConfig">Cancel</button>
        <button class="btn-primary" id="saveConfig">Save & Connect</button>
      </div>
    </div>
  </div>

  <!-- Settings button -->
  <button class="settings-btn" id="settingsBtn" title="Configure webhook URL">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke="currentColor" stroke-width="1.8"/>
      <path d="M19.4 15C19.1 15.6 19.3 16.4 19.8 16.9L19.9 17C20.3 17.4 20.3 18.1 19.9 18.5L18.5 19.9C18.1 20.3 17.4 20.3 17 19.9L16.9 19.8C16.4 19.3 15.6 19.1 15 19.4C14.4 19.7 14 20.3 14 21V21.2C14 21.7 13.6 22.1 13.1 22.1H10.9C10.4 22.1 10 21.7 10 21.2V21C10 20.3 9.6 19.7 9 19.4C8.4 19.1 7.6 19.3 7.1 19.8L7 19.9C6.6 20.3 5.9 20.3 5.5 19.9L4.1 18.5C3.7 18.1 3.7 17.4 4.1 17L4.2 16.9C4.7 16.4 4.9 15.6 4.6 15C4.3 14.4 3.7 14 3 14H2.8C2.3 14 1.9 13.6 1.9 13.1V10.9C1.9 10.4 2.3 10 2.8 10H3C3.7 10 4.3 9.6 4.6 9C4.9 8.4 4.7 7.6 4.2 7.1L4.1 7C3.7 6.6 3.7 5.9 4.1 5.5L5.5 4.1C5.9 3.7 6.6 3.7 7 4.1L7.1 4.2C7.6 4.7 8.4 4.9 9 4.6C9.6 4.3 10 3.7 10 3V2.8C10 2.3 10.4 1.9 10.9 1.9H13.1C13.6 1.9 14 2.3 14 2.8V3C14 3.7 14.4 4.3 15 4.6C15.6 4.9 16.4 4.7 16.9 4.2L17 4.1C17.4 3.7 18.1 3.7 18.5 4.1L19.9 5.5C20.3 5.9 20.3 6.6 19.9 7L19.8 7.1C19.3 7.6 19.1 8.4 19.4 9C19.7 9.6 20.3 10 21 10H21.2C21.7 10 22.1 10.4 22.1 10.9V13.1C22.1 13.6 21.7 14 21.2 14H21C20.3 14 19.7 14.4 19.4 15Z" stroke="currentColor" stroke-width="1.8"/>
    </svg>
  </button>

  <!-- Error toast -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
